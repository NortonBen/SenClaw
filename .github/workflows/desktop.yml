name: Desktop build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps (WebKitGTK + tray)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # Frontend: build with vite directly (the repo's `tsc -b` gate is WIP-broken).
      - name: Build web UI
        working-directory: web
        run: |
          npm ci
          npx vite build

      # Build the senclaw CLI so it can ship as the MCP-subprocess sidecar.
      - name: Build senclaw CLI (sidecar)
        run: cargo build --release --bin senclaw --target ${{ matrix.target }}

      - name: Stage CLI sidecar
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/senclaw.exe" src-tauri/binaries/senclaw.exe
          else
            cp "target/${{ matrix.target }}/release/senclaw" src-tauri/binaries/senclaw
          fi

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Generate app icons
        run: cargo tauri icon "senclaw_logo_simple_1_1777475846377.png"

      - name: Build desktop bundle
        run: cargo tauri build --target ${{ matrix.target }}
        env:
          # Slot in signing/notarization secrets here when available.
          # APPLE_CERTIFICATE / APPLE_SIGNING_IDENTITY / APPLE_ID / APPLE_PASSWORD ...
          # WINDOWS_CERTIFICATE / WINDOWS_CERTIFICATE_PASSWORD ...
          TAURI_SIGNING_PRIVATE_KEY: ""

      - uses: actions/upload-artifact@v4
        with:
          name: semaclaw-${{ matrix.target }}
          if-no-files-found: ignore
          path: |
            target/${{ matrix.target }}/release/bundle/**/*.dmg
            target/${{ matrix.target }}/release/bundle/**/*.app
            target/${{ matrix.target }}/release/bundle/**/*.AppImage
            target/${{ matrix.target }}/release/bundle/**/*.deb
            target/${{ matrix.target }}/release/bundle/**/*.exe
            target/${{ matrix.target }}/release/bundle/**/*.msi
