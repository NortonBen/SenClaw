name: Desktop build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Quick CI check on every push/PR ─────────────────────────────────────────
  check:
    name: Cargo check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Cargo check
        run: cargo check --all

      - name: Cargo test
        run: cargo test --all -- --test-threads=1

  # ── Full desktop bundle — only on tags or workflow_dispatch ─────────────────
  build:
    name: Build ${{ matrix.target }}
    needs: check
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps (WebKitGTK + tray)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build web UI
        working-directory: web
        run: |
          npm ci
          npx vite build

      - name: Build senclaw CLI (sidecar)
        run: cargo build --release --bin senclaw --target ${{ matrix.target }}

      - name: Stage CLI sidecar
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/senclaw.exe" src-tauri/binaries/senclaw.exe
          else
            cp "target/${{ matrix.target }}/release/senclaw" src-tauri/binaries/senclaw
          fi

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Generate app icons
        run: cargo tauri icon "senclaw_logo_simple_1_1777475846377.png"

      - name: Build desktop bundle
        run: cargo tauri build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist-artifacts
          find "target/${{ matrix.target }}/release/bundle" \
            \( -name "*.dmg" -o -name "*.app" -o -name "*.AppImage" \
               -o -name "*.deb" -o -name "*.exe" -o -name "*.msi" \) \
            -exec cp {} dist-artifacts/ \; 2>/dev/null || true
          # Also include the bare CLI binary
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/senclaw.exe" "dist-artifacts/senclaw-${{ matrix.target }}.exe"
          else
            cp "target/${{ matrix.target }}/release/senclaw" "dist-artifacts/senclaw-${{ matrix.target }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: senclaw-${{ matrix.target }}
          if-no-files-found: ignore
          path: dist-artifacts/

  # ── Create GitHub Release and attach artifacts ───────────────────────────────
  release:
    name: Create release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SenClaw ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: release-artifacts/*
