name: Hub backend build

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "hub-backend/**"
  pull_request:
    branches: [main]
    paths:
      - "hub-backend/**"
  workflow_dispatch:

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: hub-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: hub-backend/go.mod
          cache-dependency-path: hub-backend/go.sum

      - name: Install system deps (CGO + SQLite)
        run: sudo apt-get install -y --no-install-recommends gcc libc6-dev libsqlite3-dev

      - name: Download modules
        run: go mod download

      - name: Build
        run: CGO_ENABLED=1 go build -trimpath -ldflags="-s -w" -o /tmp/hub-server ./cmd/server

      - name: Test
        run: CGO_ENABLED=1 go test ./...

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: hub-backend-linux-amd64
          path: /tmp/hub-server
          if-no-files-found: warn

  docker:
    name: Docker image
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/senclaw-hub-backend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: hub-backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
