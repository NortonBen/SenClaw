<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07132B" />
      <stop offset="100%" stop-color="#050B1A" />
    </linearGradient>
    <linearGradient id="catGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00E5FF" />
      <stop offset="100%" stop-color="#5CFF7A" />
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="256" height="256" rx="44" fill="url(#bgGrad)" />

  <!-- Cat silhouette: rounded face shape -->
  <path
    d="M 128 72
       L 103 45
       L 76 84
       Q 66 98 66 116
       L 66 150
       Q 66 174 83 186
       Q 99 198 128 198
       Q 157 198 173 186
       Q 190 174 190 150
       L 190 116
       Q 190 98 180 84
       L 153 45
       Z"
    fill="#061427"
    stroke="url(#catGrad)"
    stroke-width="10"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Eye visor -->
  <rect x="88" y="112" width="80" height="20" rx="10" fill="#081C33" stroke="url(#catGrad)" stroke-width="4" />
  <rect x="100" y="114" width="24" height="10" rx="4" fill="#00E5FF" />
  <rect x="132" y="114" width="24" height="10" rx="4" fill="#5CFF7A" />

  <!-- Small nose mark -->
  <path d="M 122 146 L 128 151 L 134 146" fill="none" stroke="#3AF2C0" stroke-width="4" stroke-linecap="round" />
</svg>

